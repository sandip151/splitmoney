<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Details - SplitMoney</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="container">
    <div class="nav">
      <a href="/">Home</a>
      <a href="/projects">Project Management</a>
      <a href="/users">User Management</a>
    </div>

    <h1 id="project-title">Project</h1>

    <div class="card">
      <h3>Project Members</h3>
      <form id="add-member-form">
        <select id="member-user-select"></select>
        <button type="submit">Add Member</button>
      </form>
      <ul id="members-list"></ul>
    </div>

    <div class="card">
      <h3>Add Transaction</h3>
      <form id="add-expense-form">
        <input id="expense-description" placeholder="Description" required />
        <input id="expense-amount" type="number" step="0.01" min="0.01" placeholder="Amount" required />
        <select id="member-a-select"></select>
        <select id="member-b-select"></select>
        <select id="expense-type-select">
          <option value="A_PAID_SPLIT">UserA paid and split equally</option>
          <option value="A_OWE_FULL">UserA owe the full amount</option>
          <option value="B_PAID_SPLIT">UserB paid and split equally</option>
          <option value="B_OWE_FULL">UserB owe the full amount</option>
        </select>
        <button type="submit">Add Expense</button>
      </form>
      <p class="muted">Select UserA and UserB, then pick one of your 4 options.</p>
    </div>

    <div class="card">
      <h3>Balances</h3>
      <ul id="balances-list"></ul>
    </div>

    <div class="card">
      <h3>Settlement Suggestions</h3>
      <ul id="settlements-list"></ul>
    </div>

    <div class="card">
      <h3>Transactions</h3>
      <ul id="expenses-list"></ul>
    </div>
  </div>

  <script src="/project.js"></script>
</body>
</html>
